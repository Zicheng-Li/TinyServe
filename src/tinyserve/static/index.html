<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TinyServe Streaming Demo</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: #111a2b;
        --text: #e5edf7;
        --muted: #a9b8cd;
        --accent: #3fb68b;
        --border: #1f2e48;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at top, #13203a, var(--bg) 55%);
        color: var(--text);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      .wrap {
        max-width: 900px;
        margin: 40px auto;
        padding: 0 16px 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      .sub {
        margin: 0 0 20px;
        color: var(--muted);
      }

      .card {
        background: color-mix(in srgb, var(--panel) 95%, white 5%);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
      }

      label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      textarea,
      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #0b1426;
        color: var(--text);
        padding: 10px;
        box-sizing: border-box;
        margin-bottom: 12px;
      }

      textarea {
        resize: vertical;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
      }

      button {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 9px 14px;
        cursor: pointer;
        background: #1b2941;
        color: var(--text);
      }

      button.primary {
        background: linear-gradient(180deg, #45c99a, #329b78);
        color: #04120c;
        border: none;
        font-weight: 600;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        background: #09111f;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        min-height: 160px;
        line-height: 1.45;
      }

      .meta {
        margin-top: 8px;
        font-size: 13px;
        color: var(--muted);
      }

      @media (max-width: 700px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>TinyServe SSE Streaming Demo</h1>
      <p class="sub">Send requests to <code>/v1/generate/stream</code> to see real-time token output.</p>

      <section class="card">
        <label for="prompt">Prompt</label>
        <textarea id="prompt" rows="5">Explain what dynamic batching is and give a real-life analogy.</textarea>

        <div class="row">
          <div>
            <label for="maxNewTokens">max_new_tokens</label>
            <input id="maxNewTokens" type="number" value="128" min="1" max="2048" />
          </div>
          <div>
            <label for="temperature">temperature</label>
            <input id="temperature" type="number" value="0.7" min="0" max="2" step="0.1" />
          </div>
        </div>

        <div class="actions">
          <button id="startBtn" class="primary">Start Streaming</button>
          <button id="stopBtn">Stop</button>
          <button id="clearBtn">Clear</button>
        </div>

        <pre id="output"></pre>
        <div id="meta" class="meta">status: idle</div>
      </section>
    </main>

    <script>
      const outputEl = document.getElementById("output");
      const metaEl = document.getElementById("meta");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const clearBtn = document.getElementById("clearBtn");
      const promptEl = document.getElementById("prompt");
      const maxNewTokensEl = document.getElementById("maxNewTokens");
      const temperatureEl = document.getElementById("temperature");

      let controller = null;
      let startedAt = 0;

      function setMeta(text) {
        metaEl.textContent = text;
      }

      function append(text) {
        outputEl.textContent += text;
      }

      function safeParseJson(raw) {
        try {
          return JSON.parse(raw);
        } catch {
          return null;
        }
      }

      async function runStream() {
        if (controller) {
          controller.abort();
        }

        outputEl.textContent = "";
        startedAt = performance.now();
        setMeta("status: connecting...");
        controller = new AbortController();

        const payload = {
          prompt: promptEl.value,
          max_new_tokens: Number(maxNewTokensEl.value),
          do_sample: true,
          temperature: Number(temperatureEl.value),
          top_p: 0.8,
          enable_thinking: false,
        };

        try {
          const resp = await fetch("/v1/generate/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            signal: controller.signal,
          });

          if (!resp.ok) {
            const errText = await resp.text();
            setMeta(`status: HTTP ${resp.status}`);
            append(errText);
            return;
          }

          if (!resp.body) {
            setMeta("status: no stream body");
            return;
          }

          setMeta("status: streaming...");
          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) {
              break;
            }

            buffer += decoder.decode(value, { stream: true });
            const events = buffer.split("\n\n");
            buffer = events.pop() || "";

            for (const eventBlock of events) {
              const lines = eventBlock.split("\n");
              for (const line of lines) {
                if (!line.startsWith("data: ")) {
                  continue;
                }
                const payloadRaw = line.slice(6);
                const msg = safeParseJson(payloadRaw);
                if (!msg) {
                  continue;
                }

                if (msg.type === "token" && typeof msg.text === "string") {
                  append(msg.text);
                } else if (msg.type === "error") {
                  append(`\n\n[error] ${msg.error || "unknown"}\n`);
                } else if (msg.type === "done") {
                  const elapsedMs = Math.round(performance.now() - startedAt);
                  setMeta(
                    `status: done | latency_ms=${msg.latency_ms} | ` +
                      `tokens=${msg.total_tokens} | ui_elapsed_ms=${elapsedMs}`
                  );
                }
              }
            }
          }

          if (metaEl.textContent === "status: streaming...") {
            const elapsedMs = Math.round(performance.now() - startedAt);
            setMeta(`status: stream closed | ui_elapsed_ms=${elapsedMs}`);
          }
        } catch (err) {
          if (err.name === "AbortError") {
            setMeta("status: aborted");
          } else {
            setMeta(`status: failed (${err.message})`);
          }
        } finally {
          controller = null;
        }
      }

      startBtn.addEventListener("click", () => {
        runStream();
      });

      stopBtn.addEventListener("click", () => {
        if (controller) {
          controller.abort();
        }
      });

      clearBtn.addEventListener("click", () => {
        outputEl.textContent = "";
        setMeta("status: idle");
      });
    </script>
  </body>
</html>
